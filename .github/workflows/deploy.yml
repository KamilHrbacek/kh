name: Deploy to Cloudflare

# Git is the single source of truth and the only deploy trigger.
# Path-scoped (mirrors the flowsmith repo): a `changes` job classifies the push
# with dorny/paths-filter; each deploy job runs only when its area changed.
#   apps/www/**   → CF Pages  `kh-www`   → kh.group        (project auto-created on first deploy)
#   apps/stox/**  → CF Worker `kh-stox`  → stox.kh.group   (once apps/stox has a wrangler.toml)
# A push under root/docs/packages deploys nothing. workflow_dispatch forces all.
#
# One-time setup — add ONE GitHub repo secret on KamilHrbacek/kh
# (Settings → Secrets and variables → Actions → New repository secret):
#   - CLOUDFLARE_API_TOKEN = a Cloudflare API token with: Account · Cloudflare Pages:Edit,
#     Account · Workers Scripts:Edit, Zone · kh.group · Workers Routes:Edit.
# The account id is not secret and is baked in below. The custom domain kh.group is
# attached separately (NOT here) and never touches kh-group.eu email/MX.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      www: ${{ steps.filter.outputs.www }}
      stox: ${{ steps.filter.outputs.stox }}
      brandmanual: ${{ steps.filter.outputs.brandmanual }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            www:
              - 'apps/www/**'
            stox:
              - 'apps/stox/**'
            brandmanual:
              - 'apps/brandmanual/**'

  www:
    name: Deploy website (Pages)
    needs: changes
    if: ${{ needs.changes.outputs.www == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Create Pages project if missing (idempotent)
        run: npx wrangler@4 pages project create kh-www --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954
      - name: wrangler pages deploy
        run: npx wrangler@4 pages deploy apps/www --project-name=kh-www --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954
      - name: Attach custom domains (idempotent — apex canonical, www → apex via CF rule later)
        run: |
          for d in kh.group www.kh.group; do
            code=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/kh-www/domains" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"${d}\"}")
            echo "== ${d} -> HTTP ${code} =="
            cat /tmp/resp.json; echo
            # 200 = attached, 409/"already exists" = idempotent no-op; anything else is surfaced above
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954
      # DNS records are intentionally NOT created here. DNS — especially MX — is the
      # highest-blast-radius surface (a wrong edit silently kills team email), so the
      # CI/deploy token is DNS-less by design and DNS changes are a deliberate,
      # human-gated action (done by hand, or with a separate kh-dns token that never
      # lives in CI). The apex + www CNAME → kh-www.pages.dev is a one-time setup per
      # domain, not a per-push concern.

  stox:
    name: Deploy stox dashboard (Pages)
    needs: changes
    if: ${{ needs.changes.outputs.stox == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Create Pages project if missing (idempotent)
        run: npx wrangler@4 pages project create kh-stox --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954
      - name: wrangler pages deploy
        run: npx wrangler@4 pages deploy apps/stox --project-name=kh-stox --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954
      - name: Attach custom domain (registers stox.kh.group; DNS CNAME added by hand)
        run: |
          code=$(curl -s -o /tmp/r.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/kh-stox/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" \
            --data '{"name":"stox.kh.group"}')
          echo "== stox.kh.group -> HTTP ${code} =="; cat /tmp/r.json; echo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954

  brandmanual:
    name: Deploy brand manual (Pages — private, basic-auth)
    needs: changes
    if: ${{ needs.changes.outputs.brandmanual == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Create Pages project if missing (idempotent)
        run: npx wrangler@4 pages project create kh-brandmanual --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954
      - name: wrangler pages deploy
        run: npx wrangler@4 pages deploy apps/brandmanual --project-name=kh-brandmanual --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954
      - name: Attach custom domain (registers brandmanual.kh.group; DNS CNAME added by hand)
        run: |
          code=$(curl -s -o /tmp/r.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/kh-brandmanual/domains" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" \
            --data '{"name":"brandmanual.kh.group"}')
          echo "== brandmanual.kh.group -> HTTP ${code} =="; cat /tmp/r.json; echo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e23e7f2a089411193e86a3f444cf0954
